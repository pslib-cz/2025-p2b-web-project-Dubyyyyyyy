<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="hodiny">
        <div class="container">
          <div class="section-header">
            <div class="section-label">Kdy nás najdete</div>
            <div class="section-title">Otevírací doba</div>
            <div class="section-divider"></div>
          </div>
          <div class="hours-table-wrap">
            <table class="hours-table">
              <tr class="closed-row">
                <td class="day-name">Pondělí</td>
                <td class="day-hours">ZAVŘENO</td>
              </tr>
              <tr>
                <td class="day-name">Úterý</td>
                <td class="day-hours">15:00 – 21:00</td>
              </tr>
              <tr>
                <td class="day-name">Středa</td>
                <td class="day-hours">15:00 – 21:00</td>
              </tr>
              <tr>
                <td class="day-name">Čtvrtek</td>
                <td class="day-hours">15:00 – 21:00</td>
              </tr>
              <tr class="highlight-row">
                <td class="day-name">Pátek ✦</td>
                <td class="day-hours">17:00 – 24:00</td>
              </tr>
              <tr class="highlight-row">
                <td class="day-name">Sobota ✦</td>
                <td class="day-hours">17:00 – 24:00</td>
              </tr>
              <tr>
                <td class="day-name">Neděle</td>
                <td class="day-hours">17:00 – 23:00</td>
              </tr>
            </table>
            <div class="hours-note">
              Pro jistotu volejte: <strong>123 456 789</strong><br>
              <span style="font-size:0.8rem; margin-top:0.3rem; display:block;">✦ Pátek, sobota a neděle jsou naše hlavní
                večerní dny</span>
            </div>
          </div>
        </div>
      </section>
    
</body>
</html>
